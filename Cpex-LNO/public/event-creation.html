<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Capex Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1A1919;
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background-color: black;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(17, 1, 1, 0.927);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #FFD700;
        }

        .form-control {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #00000040;
            background-color: #1A1919;
            color: white;
            padding: 0 15px;
        }

        .form-control:focus {
            background-color: #1A1919;
            color: white;
            border-color: rgba(0, 0, 0, 0.25);
            box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.1);
        }

        .form-control::placeholder {
            color: #e0e0e0;
        }

        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            background-color: #1A1919;
            border-color: #1A1919;
            color: white;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #333;
            border-color: #333;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            color: #FFD700;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #51cf66;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="form-container">
            <h2 class="form-title">Create New Event</h2>

            <form id="createEventForm">
                <input type="text" name="event_name" class="form-control" placeholder="Event Name" required>
                <input type="text" name="user_name" class="form-control" placeholder="Username" required>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
                <input type="text" name="event_amount" class="form-control" placeholder="Event Amount (optional)" value="0">

                <button type="submit" class="btn btn-submit">CREATE EVENT</button>
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </form>
        </div>
    </div>

    <script>
        // Check authentication
        document.addEventListener('DOMContentLoaded', function() {
            const isAuthenticated = sessionStorage.getItem('isAuthenticated');
            if (!isAuthenticated) {
                window.location.href = '/login.html';
                return;
            }
        });

        document.getElementById('createEventForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = {
                event_name: formData.get('event_name'),
                user_name: formData.get('user_name'),
                password: formData.get('password'),
                event_amount: formData.get('event_amount') || '0'
            };

            try {
                const response = await fetch('/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('success-message').textContent = 'Event created successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    document.getElementById('error-message').textContent = result.error || 'Failed to create event';
                }
            } catch (error) {
                console.error('Error creating event:', error);
                document.getElementById('error-message').textContent = 'Failed to create event. Please try again.';
            }
        });
    </script>
</body>
</html>
