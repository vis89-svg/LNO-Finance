<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Capex Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card {
            cursor: pointer;
            border: 1px solid black;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }
        .hidden-scrollbar {
            overflow: scroll;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .card.selected {
            border: 2px solid #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }
        .hidden-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .form-switch {
            position: relative;
            top: 0px;
            left: 1230px;
            z-index: 1000;
            transform: scale(1.8);
            transform-origin: top right;
        }
        .card-body {
            display: flex;
            flex-direction: column;
            font-family: "Montserrat", sans-serif;
            border: #1A1919;
            height: 100px;
            padding: 15px;
            color: white;
        }
        .card-title {
            font-size: 1.25rem;
            margin-bottom: 10px;
        }
        .card-text {
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .total-amount {
            font-weight: 200;
            font-size: 16px;
            color: yellow;
            font-family: "Montserrat", sans-serif;
        }
        .table-responsive {
            margin-top: 20px;
        }
        .hidden {
            display: none;
        }
        .btn-full-width {
            width: 100%;
            text-align: center;
            display: block;
        }
        .card-container {
            padding: 18px;
            border-radius: 18px;
            max-width: 5000px;
            width: 1400px;
            margin-left: -140px;
            margin-bottom: 20px;
            font-family: "Montserrat", sans-serif;
            background-color: white;
        }
        .finance-conatiner {
            border: 2px solid black;
            border-radius: 16px;
            padding: 25px;
            background-color: black;
        }
        .add-event-card {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 180px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            color: inherit;
        }
        .add-event-card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-color: #007bff;
        }
        .add-event-icon {
            font-size: 3rem;
            color: #28a745;
        }
        .records {
            font-family: "Montserrat", sans-serif;
        }
        .inside-table {
            display: flex;
            align-content: space-between;
        }
        .account {
            font-size: 23px;
            font-weight: 600;
            font-family: "Montserrat", sans-serif;
            color: white;
            margin: 0;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        th {
            text-align: left;
            padding: 10px;
        }
        tr {
            border-radius: 10px;
            overflow: hidden;
            color: white;
            font-family: "Montserrat", sans-serif;
            font-size: 16px;
            font-weight: 400;
        }
        td {
            padding: 15px;
            vertical-align: middle;
        }
        .rounded-row td:first-child {
            border-top-left-radius: 13px;
            border-bottom-left-radius: 13px;
        }
        .rounded-row td:last-child {
            border-top-right-radius: 13px;
            border-bottom-right-radius: 13px;
        }
        .row-from {
            font-size: 10px;
            transition: border-color 0.3s ease;
            font-family: "Montserrat", sans-serif;
        }
        .rounded-row:hover {
            border: 2px solid red;
        }
        .card-menu {
            position: absolute;
            top: 2px;
            right: 2px;
            cursor: pointer;
            z-index: 50;
        }
        .card-menu-content {
            display: none;
            position: absolute;
            right: 0;
            top: 20px;
            background-color: #f9f9f9;
            min-width: 120px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 11;
            border-radius: 4px;
        }
        .card-menu-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .card-menu-content a:hover {
            background-color: #f1f1f1;
            border-radius: 4px;
        }
        .card.delete-mode {
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .card.selected-for-delete {
            border: 2px solid red;
            opacity: 1;
        }
        .delete-button {
            display: none;
            position: fixed;
            bottom: 20px;
            margin-right: 50px;
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-button.show {
            display: block;
        }
        #deleteButton {
            font-size: 16px;
            font-weight: 600;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #deleteButton:hover {
            background-color: #2c2c2c;
        }
        #logoutButton {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }
        .logout-icon-box {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 40px;
            background-color: black;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .logout-icon-box svg {
            fill: white;
            stroke: white;
            transition: all 0.3s ease;
        }
        #logoutButton:hover .logout-icon-box {
            opacity: 0.8;
        }
        #logoutButton:hover .logout-icon-box svg {
            fill: white;
            stroke: white;
        }
        .adjust-margin {
            margin-left: 67px !important;
        }
        .delete-circle {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
        }
        .inner-circle {
            display: none;
            width: 12px;
            height: 12px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .card.selected-for-delete .inner-circle {
            display: block;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .delete-btn {
            background-color: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 34px;
            padding: 10px;
            transition: color 0.3s ease;
        }
        .delete-btn:hover {
            color: #ff4d4d;
        }
        .edit-btn {
            background-color: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 10px;
            transition: color 0.3s ease;
        }
        .edit-btn:hover {
            color: #4d94ff;
        }
        .edit-circle {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
            display: none;
        }
        .edit-icon {
            color: white;
            font-size: 12px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .card.edit-mode .edit-circle {
            display: block;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .no-events-message {
            text-align: center;
            color: white;
            padding: 20px;
        }
    </style>
</head>
<body style="background-color: #1A1919;">
    <div class="container mt-4">
        <div class="row">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-left: -30px; margin-right: -30px; padding-right: 20px; margin-top: 10px;">
                <img src="CAPEX.png" alt="Capex Logo" class="top-left-image" style="margin-right: -10px;" onerror="this.style.display='none'">

                <button id="logoutButton" class="btn btn-link" aria-label="Logout">
                    <span class="logout-icon-box" style="margin-right: -40px;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="27" height="27">
                            <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"
                                  fill="white" stroke="white" stroke-width="0.5"/>
                        </svg>
                    </span>
                </button>
            </div>
        </div>

        <!-- Card Container Box -->
        <div style="margin-top: 40px; margin-left: -45px; background-color: black; border: black;" class="card-container">
            <div class="header-row">
                <p class="account">ACCOUNTS</p>
                <div>
                    <button id="editButton" onclick="headerEditButtonClick()" class="edit-btn" style="margin-right: 15px;">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="deleteButton" onclick="toggleDeleteMode()" class="delete-btn" style="margin-right: 25px;">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>
            <div style="margin-top: 30px;" class="row" id="events-container">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <!-- Finance Table Container Box -->
        <div id="finance-tables-container"></div>
    </div>

    <button id="deleteSelectedButton" onclick="deleteSelectedEvents()" style="display: none; position: fixed; bottom: 20px; right: 20px; background-color: red; color: white; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Montserrat', sans-serif; border-radius: 5px;">Delete Selected</button>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
        let deleteMode = false;
        let editMode = false;
        let eventsData = [];
        let financesData = {};

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            const isAuthenticated = sessionStorage.getItem('isAuthenticated');
            if (!isAuthenticated) {
                window.location.href = '/login.html';
                return;
            }
            loadEvents();
        });

        // Load events from API
        async function loadEvents() {
            try {
                const response = await fetch('/api/events', {
                    credentials: 'include'
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        window.location.href = '/login.html';
                        return;
                    }
                    throw new Error('Failed to load events');
                }

                eventsData = await response.json();
                renderEvents();
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('events-container').innerHTML =
                    '<div class="no-events-message">Error loading events. Please refresh the page.</div>';
            }
        }

        // Render events to the DOM
        function renderEvents() {
            const container = document.getElementById('events-container');

            if (eventsData.length === 0) {
                container.innerHTML = `
                    <div class="no-events-message">No events found. Create your first event!</div>
                    <div class="col-md-4 mb-4">
                        <a href="/event-creation.html" style="text-decoration: none; display: block;">
                            <div class="card add-event-card" style="height: 100px; background-color: #1A1919; align-items: center; display: flex; justify-content: center;">
                                <div class="add-event-icon" style="font-size: 36px; color: white;">+</div>
                            </div>
                        </a>
                    </div>
                `;
                return;
            }

            let html = '';
            eventsData.forEach(event => {
                html += `
                    <div class="col-md-4 mb-4">
                        <div class="card" onclick="toggleFinanceTable('${event.id}')" data-event-id="${event.id}">
                            <div class="delete-circle" style="display: none;">
                                <div class="inner-circle"></div>
                            </div>
                            <div class="edit-circle" style="display: none;" onclick="handleEditClick(event, '${event.id}')">
                                <i class="fas fa-pencil-alt edit-icon"></i>
                            </div>
                            <div class="card-body" style="background-color: #1A1919;">
                                <div class="d-flex justify-content-between align-items-center">
                                    <p class="card-title mb-0" style="font-weight: 400; font-size: 16px;">
                                        ${escapeHtml(event.event_name)}
                                    </p>
                                    <p class="total-amount mb-0" id="total-amount-${event.id}">
                                        ₹ ${event.total_amount !== undefined ? event.total_amount : event.event_amount || '0'}
                                    </p>
                                </div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <p class="card-text" style="margin-top: 25px; font-weight: 400; font-size: 16px;">${escapeHtml(event.user_name)}</p>
                                    <p class="card-text" style="margin-top: 25px; font-weight: 400; font-size: 16px;">${event.event_amount || '0'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Add the "Add Event" card
            html += `
                <div class="col-md-4 mb-4">
                    <a href="/event-creation.html" style="text-decoration: none; display: block;">
                        <div class="card" style="height: 100px; background-color: #1A1919; align-items: center;">
                            <div class="add-event-icon" style="font-size: 36px; color: white; margin-top: 21px; text-align: center;">+</div>
                        </div>
                    </a>
                </div>
            `;

            container.innerHTML = html;
        }

        // Toggle finance table visibility
        async function toggleFinanceTable(eventId) {
            if (deleteMode) return;

            const allTables = document.querySelectorAll('[id^="finance-table-"]');
            const clickedTable = document.getElementById(`finance-table-${eventId}`);
            const clickedCard = document.querySelector(`.card[data-event-id="${eventId}"]`);
            const allCards = document.querySelectorAll('.card');

            allCards.forEach(card => card.classList.remove('selected'));

            if (clickedTable) {
                clickedTable.classList.toggle('hidden');
                if (!clickedTable.classList.contains('hidden')) {
                    clickedCard.classList.add('selected');
                    setTimeout(() => clickedTable.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                } else {
                    clickedCard.classList.remove('selected');
                    clickedCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
                return;
            }

            // Load finances for this event if not already loaded
            if (!financesData[eventId]) {
                try {
                    const response = await fetch(`/api/finances/event/${eventId}`, {
                        credentials: 'include'
                    });
                    if (response.ok) {
                        financesData[eventId] = await response.json();
                    }
                } catch (error) {
                    console.error('Error loading finances:', error);
                }
            }

            renderFinanceTable(eventId);
        }

        // Render finance table for an event
        function renderFinanceTable(eventId) {
            const event = eventsData.find(e => e.id === eventId);
            if (!event) return;

            const finances = financesData[eventId] || [];
            const totalAmount = finances.reduce((sum, f) => sum + parseFloat(f.amount || 0), 0);

            const container = document.getElementById('finance-tables-container');

            let financesHtml = `
                <div id="finance-table-${eventId}" class="table-responsive adjust-margin" style="width: 1400px; margin-left: -45px;">
                    <div class="finance-conatiner">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <p style="font-size: 23px; font-weight: 600; color: white;" class="records">RECORDS</p>
                            <span onclick="collapseTable('${eventId}')" style="cursor: pointer; margin-right: -1040px;" title="Collapse">
                                <i class="fas fa-chevron-up" style="color: white; font-size: 28px;"></i>
                            </span>
                            <span onclick="downloadTableAsPDF('${eventId}')" style="cursor: pointer;" title="Download CSV">
                                <i class="fas fa-download" style="color: white; font-size: 23px; margin-left: -45px;"></i>
                            </span>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3" style="font-family: 'Montserrat', sans-serif;">
                            <h4 class="mb-0" style="font-size: 16px; font-weight: 400; color: white;">Account: ${escapeHtml(event.event_name)}</h4>
                            <h4 class="mb-0" style="font-size: 16px; font-weight: 400; color: white;">Account Holder: ${escapeHtml(event.user_name)}</h4>
                            <p class="total-amount mb-0" id="finance-total-amount-${eventId}">
                                Account Balance: ₹ ${totalAmount.toFixed(2)}
                            </p>
                        </div>

                        <table>
                            <thead>
                                <tr style="font-size: 15px; font-weight: 200;">
                                    <th>From</th>
                                    <th>To</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                    <th>Mode</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            if (finances.length === 0) {
                financesHtml += `<tr><td colspan="6">No finance records found.</td></tr>`;
            } else {
                finances.forEach(finance => {
                    const dateParts = finance.date_event ? finance.date_event.split('-') : ['01', '01', '2000'];
                    const formattedDate = dateParts.length === 3 ? `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}` : finance.date_event;

                    financesHtml += `
                        <tr class="rounded-row" data-amount="${finance.amount}" style="background-color: #1A1919; color: white;">
                            <td>${escapeHtml(finance.from_person)}</td>
                            <td>${escapeHtml(finance.to_person)}</td>
                            <td>${escapeHtml(finance.description)}</td>
                            <td>${finance.amount}</td>
                            <td>${formattedDate}</td>
                            <td>${escapeHtml(finance.mode)}</td>
                        </tr>
                    `;
                });
            }

            financesHtml += `
                            </tbody>
                        </table>
                        <div class="mt-3">
                            <a href="/add-finance/${eventId}.html" class="btn btn-full-width" style="background-color: #1A1919; color: white; font-size: 30px; font-weight: 700; display: inline-block; text-align: center; text-decoration: none; padding: 10px;">+</a>
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML += financesHtml;
        }

        function collapseTable(eventId) {
            const table = document.getElementById(`finance-table-${eventId}`);
            const card = document.querySelector(`.card[data-event-id="${eventId}"]`);
            table.classList.add('hidden');
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Toggle delete mode
        function toggleDeleteMode() {
            deleteMode = !deleteMode;
            const cards = document.querySelectorAll('.card');
            const deleteButton = document.getElementById('deleteButton');
            const deleteSelectedButton = document.getElementById('deleteSelectedButton');

            cards.forEach(card => {
                const deleteCircle = card.querySelector('.delete-circle');
                if (deleteMode) {
                    card.classList.add('delete-mode');
                    deleteCircle.style.display = 'block';
                    card.setAttribute('data-onclick', card.getAttribute('onclick'));
                    card.removeAttribute('onclick');
                } else {
                    card.classList.remove('delete-mode');
                    card.classList.remove('selected-for-delete');
                    deleteCircle.style.display = 'none';
                    card.setAttribute('onclick', card.getAttribute('data-onclick'));
                    card.removeAttribute('data-onclick');
                }
            });

            if (deleteMode) {
                deleteButton.style.backgroundColor = 'red';
                deleteSelectedButton.style.display = 'block';
            } else {
                deleteButton.style.backgroundColor = '#1A1919';
                deleteSelectedButton.style.display = 'none';
            }
        }

        // Delete selected events
        async function deleteSelectedEvents() {
            const selectedCards = document.querySelectorAll('.card.selected-for-delete');
            if (selectedCards.length === 0) {
                alert('No cards selected for deletion.');
                return;
            }

            if (confirm('Are you sure you want to delete the selected events and all associated finances?')) {
                const deletePromises = Array.from(selectedCards).map(card => {
                    const eventId = card.getAttribute('data-event-id');
                    return deleteEvent(eventId, card);
                });

                document.getElementById('deleteSelectedButton').style.display = 'none';

                try {
                    await Promise.all(deletePromises);
                    exitDeleteMode();
                    loadEvents(); // Reload events
                } catch (error) {
                    console.error('Error deleting events:', error);
                    alert('An error occurred while deleting events. Please try again.');
                }
            }
        }

        // Delete single event
        async function deleteEvent(eventId, cardElement) {
            const response = await fetch(`/api/events/${eventId}/delete`, {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`Server responded with ${response.status}`);
            }

            const data = await response.json();
            if (data.success) {
                cardElement.remove();
            } else {
                throw new Error(data.error || 'Delete failed');
            }
        }

        function exitDeleteMode() {
            deleteMode = false;
            const cards = document.querySelectorAll('.card');
            const deleteButton = document.getElementById('deleteButton');

            cards.forEach(card => {
                const deleteCircle = card.querySelector('.delete-circle');
                card.classList.remove('delete-mode');
                card.classList.remove('selected-for-delete');
                deleteCircle.style.display = 'none';
                card.setAttribute('onclick', card.getAttribute('data-onclick'));
                card.removeAttribute('data-onclick');
            });

            deleteButton.style.backgroundColor = '#1A1919';
        }

        // Toggle edit mode
        function toggleEditMode() {
            editMode = !editMode;
            const cards = document.querySelectorAll('.card');
            const editButton = document.getElementById('editButton');

            cards.forEach(card => {
                const editCircle = card.querySelector('.edit-circle');
                if (editMode) {
                    card.classList.add('edit-mode');
                    editCircle.style.display = 'block';
                    card.setAttribute('data-onclick', card.getAttribute('onclick'));
                    card.removeAttribute('onclick');
                } else {
                    card.classList.remove('edit-mode');
                    editCircle.style.display = 'none';
                    card.setAttribute('onclick', card.getAttribute('data-onclick'));
                    card.removeAttribute('data-onclick');
                }
            });

            if (editMode) {
                editButton.style.color = '#4d94ff';
            } else {
                editButton.style.color = 'white';
            }
        }

        function headerEditButtonClick() {
            if (eventsData.length === 0) {
                window.location.href = '/event-creation.html';
                return;
            }
            toggleEditMode();
        }

        // Handle edit click
        document.addEventListener('click', function(event) {
            if (editMode && event.target.closest('.edit-circle')) {
                event.preventDefault();
                event.stopPropagation();
                const card = event.target.closest('.card');
                const eventId = card.getAttribute('data-event-id');
                window.location.href = `/edit-event/${eventId}.html`;
            }
        });

        function handleEditClick(event, eventId) {
            if (!editMode) return;
            event.preventDefault();
            event.stopPropagation();
            window.location.href = `/edit-event/${eventId}.html`;
        }

        // Handle delete circle click
        document.addEventListener('click', function(event) {
            if (deleteMode && (event.target.closest('.card') || event.target.closest('.delete-circle'))) {
                event.preventDefault();
                event.stopPropagation();
                const card = event.target.closest('.card');
                card.classList.toggle('selected-for-delete');
            }
        });

        // Download table as CSV
        function downloadTableAsPDF(eventId) {
            const finances = financesData[eventId] || [];
            const event = eventsData.find(e => e.id === eventId);
            const totalAmount = finances.reduce((sum, f) => sum + parseFloat(f.amount || 0), 0);

            let csvContent = `Account Holder: ${event.event_name}, Account Balance: ₹${totalAmount.toFixed(2)}\n\n`;
            csvContent += 'From,To,Description,Amount,Date,Mode\n';

            finances.forEach(row => {
                csvContent += `"${row.from_person}","${row.to_person}","${row.description}",${row.amount},${row.date_event},"${row.mode}"\n`;
            });

            const csvBlob = new Blob([csvContent], { type: 'text/csv' });
            const downloadLink = document.createElement('a');
            downloadLink.href = URL.createObjectURL(csvBlob);
            downloadLink.download = `finance_records_${event.event_name}.csv`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        // Logout handler
        document.getElementById('logoutButton').addEventListener('click', function() {
            if (confirm('Are you sure you want to log out?')) {
                fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                }).then(() => {
                    sessionStorage.removeItem('isAuthenticated');
                    sessionStorage.removeItem('user');
                    window.location.href = '/login.html';
                });
            }
        });

        // Utility function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
