<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - Capex Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1A1919;
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background-color: black;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(17, 1, 1, 0.927);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #FFD700;
        }

        .form-control {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #00000040;
            background-color: #1A1919;
            color: white;
            padding: 0 15px;
        }

        .form-control:focus {
            background-color: #1A1919;
            color: white;
            border-color: rgba(0, 0, 0, 0.25);
            box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.1);
        }

        .form-control::placeholder {
            color: #e0e0e0;
        }

        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            background-color: #1A1919;
            border-color: #1A1919;
            color: white;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #333;
            border-color: #333;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            color: #FFD700;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #51cf66;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="form-container">
            <h2 class="form-title">Edit Event</h2>

            <div id="loading" class="loading">
                <div class="spinner-border text-light" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <form id="editEventForm" style="display: none;">
                <input type="text" name="event_name" id="event_name" class="form-control" placeholder="Event Name" required>
                <input type="text" name="user_name" id="user_name" class="form-control" placeholder="Username" required>
                <input type="password" name="password" id="password" class="form-control" placeholder="Password (leave unchanged to keep current)">
                <input type="text" name="event_amount" id="event_amount" class="form-control" placeholder="Event Amount">

                <button type="submit" class="btn btn-submit">UPDATE EVENT</button>
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </form>
        </div>
    </div>

    <script>
        let eventId = null;

        // Check authentication and get event ID from URL
        document.addEventListener('DOMContentLoaded', function() {
            const isAuthenticated = sessionStorage.getItem('isAuthenticated');
            if (!isAuthenticated) {
                window.location.href = '/login.html';
                return;
            }

            // Extract event ID from URL path: /edit-event/:eventId.html or /edit-event/:eventId
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const lastPart = pathParts[pathParts.length - 1];
            let match = lastPart.match(/^edit-event-(.+)\.html$/);
            if (match && match[1]) {
                eventId = match[1];
            } else if (pathParts.length >= 2 && pathParts[pathParts.length - 2] === 'edit-event') {
                eventId = lastPart.replace(/\.html$/, '');
            }

            if (eventId) {
                loadEventData(eventId);
            } else {
                document.getElementById('error-message').textContent = 'Event ID is required';
                document.getElementById('loading').style.display = 'none';
            }
        });

        // Load event data
        async function loadEventData(eventId) {
            try {
                const response = await fetch(`/api/events/${eventId}`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error('Failed to load event data');
                }

                const event = await response.json();

                document.getElementById('event_name').value = event.event_name;
                document.getElementById('user_name').value = event.user_name;
                document.getElementById('event_amount').value = event.event_amount || '0';

                document.getElementById('loading').style.display = 'none';
                document.getElementById('editEventForm').style.display = 'block';
            } catch (error) {
                console.error('Error loading event:', error);
                document.getElementById('error-message').textContent = 'Failed to load event data';
                document.getElementById('loading').style.display = 'none';
            }
        }

        document.getElementById('editEventForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = new FormData(this);
            const data = {
                event_name: formData.get('event_name'),
                user_name: formData.get('user_name'),
                event_amount: formData.get('event_amount') || '0'
            };

            // Only include password if it was changed
            if (formData.get('password')) {
                data.password = formData.get('password');
            }

            try {
                const response = await fetch(`/api/events/${eventId}/update`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('success-message').textContent = 'Event updated successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    document.getElementById('error-message').textContent = result.error || 'Failed to update event';
                }
            } catch (error) {
                console.error('Error updating event:', error);
                document.getElementById('error-message').textContent = 'Failed to update event. Please try again.';
            }
        });
    </script>
</body>
</html>
