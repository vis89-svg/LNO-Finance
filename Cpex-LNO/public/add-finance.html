<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Finance Record - Capex Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1A1919;
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background-color: black;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(17, 1, 1, 0.927);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
            color: #FFD700;
        }

        .form-control {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #00000040;
            background-color: #1A1919;
            color: white;
            padding: 0 15px;
        }

        .form-control:focus {
            background-color: #1A1919;
            color: white;
            border-color: rgba(0, 0, 0, 0.25);
            box-shadow: 0 0 0 0.2rem rgba(0, 0, 0, 0.1);
        }

        .form-control::placeholder {
            color: #e0e0e0;
        }

        select.form-control {
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            height: 50px;
            border-radius: 15px;
            background-color: #1A1919;
            border-color: #1A1919;
            color: white;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #333;
            border-color: #333;
        }

        .btn-back {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            color: #FFD700;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: -15px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #51cf66;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #333;
            background-color: #1A1919;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            border-color: #FFD700;
            background-color: #2a2a2a;
        }

        .mode-btn.selected {
            border-color: #FFD700;
            background-color: #FFD700;
            color: black;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="window.history.back()">
            <i class="fas fa-arrow-left"></i> Back
        </button>

        <div class="form-container">
            <h2 class="form-title">Add Finance Record</h2>
                <div id="event-name-display" style="margin-bottom: 20px; font-size: 16px; color: #e0e0e0;"></div>

                <form id="addFinanceForm">
                    <input type="text" name="from_person" class="form-control" placeholder="From Person" required>
                    <input type="text" name="to_person" class="form-control" placeholder="To Person" required>
                    <input type="text" name="description" class="form-control" placeholder="Description (optional)">
                    <input type="number" name="amount" class="form-control" placeholder="Amount" step="0.01" required>

                    <div class="mode-buttons" style="margin-bottom: 20px;">
                        <button type="button" class="mode-btn selected" data-type="Expense" onclick="selectTransactionType('Expense')">Expense</button>
                        <button type="button" class="mode-btn" data-type="Income" onclick="selectTransactionType('Income')">Income</button>
                    </div>
                    <input type="hidden" name="transaction_type" id="transaction-type-input" value="Expense">

                    <div class="mode-buttons" style="margin-bottom: 20px;">
                        <button type="button" class="mode-btn" data-mode="Cash" onclick="selectMode('Cash')">Cash</button>
                        <button type="button" class="mode-btn" data-mode="Card" onclick="selectMode('Card')">Card</button>
                        <button type="button" class="mode-btn selected" data-mode="Online" onclick="selectMode('Online')">Online</button>
                    </div>
                    <input type="hidden" name="mode" id="mode-input" value="Online">

                <input type="date" name="date_event" class="form-control" required>

                <button type="submit" class="btn btn-submit">ADD RECORD</button>
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </form>
        </div>
    </div>

    <script>
        let eventId = null;

        // Check authentication and get event ID from URL
        document.addEventListener('DOMContentLoaded', function() {
            const isAuthenticated = sessionStorage.getItem('isAuthenticated');
            if (!isAuthenticated) {
                window.location.href = '/login.html';
                return;
            }

            // Extract event ID from URL path: /add-finance/:eventId.html
            const pathParts = window.location.pathname.split('/');
            const filename = pathParts[pathParts.length - 1];
            const match = filename.match(/add-finance-(.+)\.html/);
            if (match && match[1]) {
                eventId = match[1];
            } else if (pathParts.length >= 2 && pathParts[pathParts.length - 2] === 'add-finance') {
                eventId = pathParts[pathParts.length - 1].replace(/\.html$/, '');
            } else {
                // Try to get from query parameter
                const urlParams = new URLSearchParams(window.location.search);
                eventId = urlParams.get('eventId');
            }

            if (!eventId) {
                document.getElementById('error-message').textContent = 'Event ID is required';
            } else {
                document.getElementById('event-name-display').textContent = `Event: ${eventId}`;
            }

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.querySelector('input[name="date_event"]').value = today;
        });

        function selectMode(mode) {
            document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.mode === mode) {
                    btn.classList.add('selected');
                }
            });
            document.getElementById('mode-input').value = mode;
        }

        function selectTransactionType(type) {
            document.querySelectorAll('.mode-btn[data-type]').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.dataset.type === type) {
                    btn.classList.add('selected');
                }
            });
            document.getElementById('transaction-type-input').value = type;
        }

        document.getElementById('addFinanceForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!eventId) {
                document.getElementById('error-message').textContent = 'Event ID is required';
                return;
            }

            const formData = new FormData(this);
            const data = {
                from_person: formData.get('from_person'),
                to_person: formData.get('to_person'),
                description: formData.get('description') || '',
                amount: formData.get('amount'),
                mode: formData.get('mode'),
                transaction_type: formData.get('transaction_type'),
                date_event: formData.get('date_event')
            };

            try {
                const response = await fetch(`/api/finances/event/${eventId}/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    document.getElementById('success-message').textContent = 'Finance record added successfully! Redirecting...';
                    setTimeout(() => {
                        window.location.href = `/index.html`;
                    }, 1500);
                } else {
                    document.getElementById('error-message').textContent = result.error || 'Failed to add finance record';
                }
            } catch (error) {
                console.error('Error adding finance:', error);
                document.getElementById('error-message').textContent = 'Failed to add finance record. Please try again.';
            }
        });
    </script>
</body>
</html>
